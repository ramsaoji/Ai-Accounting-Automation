<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Dark elegant background gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <!-- Golden gradient for initials & border -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="50%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    <!-- Soft glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Circular background with golden glow border -->
  <circle cx="50" cy="50" r="46" fill="url(#bg-grad)" stroke="url(#gold-grad)" stroke-width="3" />
  
  <!-- Sleek background financial node grid details -->
  <path d="M 25 50 L 75 50 M 50 25 L 50 75" stroke="rgba(251, 191, 36, 0.08)" stroke-width="1.5" />
  <circle cx="50" cy="50" r="28" fill="none" stroke="rgba(251, 191, 36, 0.05)" stroke-width="1" />
  
  <!-- "HG" Initials in premium Outfit-like typography -->
  <text x="50" y="58" font-family="'Outfit', 'Inter', system-ui, sans-serif" font-weight="800" font-size="28" fill="url(#gold-grad)" text-anchor="middle" letter-spacing="-1">HG</text>
  
  <!-- Audit Gold Sparkle representing audited quality and accuracy -->
  <path d="M 72 28 Q 72 34 78 34 Q 72 34 72 40 Q 72 34 66 34 Q 72 34 72 28 Z" fill="#fbbf24" filter="url(#glow)" />
</svg>
